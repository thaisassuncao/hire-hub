name: Frontend CI

on:
  push:
    branches: [main]
    paths: [frontend/**]
  pull_request:
    paths: [frontend/**]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npx tsc --noEmit

      - run: npx eslint .

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run build
