services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hirehub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hirehub}
      POSTGRES_DB: ${POSTGRES_DB:-hirehub}
    ports:
      - "${DOCKER_PG_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hirehub}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-hirehub}:${POSTGRES_PASSWORD:-hirehub}@postgres:5432/${POSTGRES_DB:-hirehub}?sslmode=disable
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret}
    ports:
      - "${DOCKER_BACKEND_PORT:-8081}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "${DOCKER_FRONTEND_PORT:-3001}:80"
    depends_on:
      - backend

volumes:
  pgdata:
